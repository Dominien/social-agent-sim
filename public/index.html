<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hauswelt — 3D Viewer</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: rgba(26, 26, 26, 0.88);
    --surface2: #242424;
    --border: #333;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #e8a44a;
    --accent-dim: #b37a2e;
    --agent-marco: #5b8dd9;
    --agent-sarah: #d95ba3;
    --agent-marta: #d9a85b;
    --agent-hakim: #5bd9a8;
    --agent-suki: #d95b5b;
    --agent-rolf: #8a8a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ─── Canvas ─────────────────────────── */
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #canvas-container canvas { display: block; }

  /* ─── Top Bar ────────────────────────── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 10;
  }
  .top-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .top-info {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ─── Sidebar ────────────────────────── */
  #sidebar {
    position: fixed;
    right: 0;
    top: 48px;
    bottom: 56px;
    width: 380px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    z-index: 10;
    transition: transform 0.3s ease;
    padding: 16px;
  }
  #sidebar.collapsed { transform: translateX(100%); }
  #sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  #sidebar-toggle {
    position: fixed;
    right: 380px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 11;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text-dim);
    padding: 12px 6px;
    cursor: pointer;
    font-size: 12px;
    border-radius: 4px 0 0 4px;
    transition: right 0.3s ease;
    font-family: inherit;
  }
  #sidebar-toggle.collapsed { right: 0; }
  #sidebar-toggle:hover { color: var(--accent); }

  /* ─── Agent Detail ───────────────────── */
  .agent-detail {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .agent-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .agent-detail-name { font-size: 14px; font-weight: 600; }
  .agent-detail-loc { font-size: 11px; color: var(--text-dim); margin-left: 8px; }
  .agent-detail-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 16px; cursor: pointer; padding: 0 4px; font-family: inherit;
  }
  .agent-detail-close:hover { color: var(--text); }
  .detail-stats { font-size: 11px; margin-bottom: 8px; }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-label { color: var(--text-dim); }
  .stat-value { color: var(--text); }
  .detail-memory { margin-top: 8px; }
  .detail-memory h3 {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px;
  }
  .detail-memory pre {
    font-size: 10px; line-height: 1.4; color: var(--text-dim);
    white-space: pre-wrap; max-height: 200px; overflow-y: auto;
  }

  /* ─── Scene Log ──────────────────────── */
  .location-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .location-card.has-interaction { border-left: 3px solid var(--accent); }
  .location-card.solo { border-left: 3px solid #4a6a4a; }
  .location-header {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--accent); margin-bottom: 4px;
  }
  .location-agents-label { font-size: 10px; color: var(--text-dim); margin-bottom: 10px; }
  .env-info {
    font-size: 12px; line-height: 1.5; color: var(--text-dim);
    font-style: italic; padding: 8px;
    background: rgba(255,255,255,0.02); border-radius: 4px; margin-bottom: 12px;
  }
  .round-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin: 10px 0 6px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .round-label:first-of-type { border-top: none; padding-top: 0; }
  .action-entry {
    margin-bottom: 6px; padding-left: 12px;
    border-left: 2px solid var(--border);
  }
  .action-agent { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .action-agent[data-agent="marco"] { color: var(--agent-marco); }
  .action-agent[data-agent="sarah"] { color: var(--agent-sarah); }
  .action-agent[data-agent="marta"] { color: var(--agent-marta); }
  .action-agent[data-agent="hakim"] { color: var(--agent-hakim); }
  .action-agent[data-agent="suki"]  { color: var(--agent-suki); }
  .action-agent[data-agent="rolf"]  { color: var(--agent-rolf); }
  .tool-speak { color: var(--accent); }
  .tool-speak::before { content: '\201E'; }
  .tool-speak::after { content: '\201C'; }
  .tool-think { color: var(--text-dim); font-style: italic; font-size: 12px; }
  .tool-action { color: var(--text); }
  .tool-move { color: #7a9fd9; font-size: 12px; }
  .tool-other { color: var(--text-dim); font-size: 12px; }
  .no-data {
    color: var(--text-dim); font-style: italic;
    padding: 40px; text-align: center;
  }
  .night-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px; margin-bottom: 8px;
    border-left: 3px solid #336;
  }
  .night-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: #669; margin-bottom: 8px;
  }

  /* ─── Timeline Bar ───────────────────── */
  #timeline-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    z-index: 10;
  }
  .tl-controls { display: flex; gap: 6px; }
  .tl-controls button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 12px;
    transition: border-color 0.2s;
  }
  .tl-controls button:hover { border-color: var(--accent); }
  .tl-controls button:disabled { opacity: 0.3; cursor: default; }
  .tl-controls button.active { border-color: var(--accent); color: var(--accent); }
  .tl-track {
    flex: 1; height: 28px; display: flex; align-items: center;
    gap: 1px; overflow-x: auto; padding: 0 4px;
  }
  .tick-marker {
    min-width: 6px; height: 20px; background: #3a3a3a;
    border-radius: 1px; cursor: pointer; transition: all 0.15s;
  }
  .tick-marker:hover { background: #444; transform: scaleY(1.3); }
  .tick-marker.active { background: var(--accent); }
  .tl-info {
    font-size: 11px; color: var(--text-dim);
    min-width: 100px; text-align: right;
  }

  /* ─── CSS2D Labels ───────────────────── */
  .room-label {
    color: #666; font-size: 9px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    text-transform: uppercase; letter-spacing: 1px;
    pointer-events: auto; cursor: pointer;
    padding: 2px 6px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 2px;
    white-space: nowrap;
    user-select: none;
  }
  .room-label:hover { color: var(--accent); }

  .agent-label {
    font-size: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 600;
    pointer-events: none;
    padding: 1px 4px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 2px;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  .bubble {
    background: rgba(15, 15, 15, 0.92);
    border: 1px solid #555;
    border-radius: 8px;
    padding: 6px 10px;
    max-width: 220px;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text);
    pointer-events: none;
    transition: opacity 0.5s;
    white-space: normal;
    word-wrap: break-word;
    line-height: 1.4;
  }
  .bubble-speak { border-color: var(--accent); color: var(--accent); }
  .bubble-do { border-color: #666; color: #888; font-style: italic; font-size: 10px; }
  .bubble.fading { opacity: 0; }

  /* ─── Scrollbar ──────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="top-bar">
  <div class="top-title">HAUSWELT</div>
  <div class="top-info">
    <span id="sim-time">—</span>
    <span id="sim-weather"></span>
    <span id="sim-counter"></span>
  </div>
</div>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="agent-detail" style="display:none"></div>
  <div id="scene-section">
    <h2>Szenen</h2>
    <div id="scene-content">
      <div class="no-data">Starte die Simulation oder wähle einen Tick.</div>
    </div>
  </div>
</div>
<button id="sidebar-toggle">◀</button>

<!-- Timeline -->
<div id="timeline-bar">
  <div class="tl-controls">
    <button id="btn-prev" disabled>&#8592;</button>
    <button id="btn-next" disabled>&#8594;</button>
    <button id="btn-auto">LIVE</button>
  </div>
  <div class="tl-track" id="timeline-track"></div>
  <div class="tl-info" id="timeline-info">Tick —</div>
</div>

<!-- Three.js Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════

const AGENTS = {
  marco: { color: '#5b8dd9', display: 'Marco', initials: 'M' },
  sarah: { color: '#d95ba3', display: 'Sarah', initials: 'S' },
  marta: { color: '#d9a85b', display: 'Marta', initials: 'Mt' },
  hakim: { color: '#5bd9a8', display: 'Hakim', initials: 'H' },
  suki:  { color: '#d95b5b', display: 'Suki',  initials: 'Sk' },
  rolf:  { color: '#8a8a8a', display: 'Rolf',  initials: 'R' },
};

const FLOOR_HEIGHT = 3;
const BUILDING_DEPTH = 7;
const BUILDING_Z_BACK = -BUILDING_DEPTH;

const ROOM_DEFS = [
  { name: 'Wohnung 6',    label: 'Whg 6 — Suki',          xMin: -6, xMax: 3,    y: 12 },
  { name: 'Wohnung 5',    label: 'Whg 5 — Marco & Sarah',  xMin: -6, xMax: -1.5, y: 9 },
  { name: 'Wohnung 4',    label: 'Whg 4 — Hakim',          xMin: -1.5, xMax: 3,  y: 9 },
  { name: 'Wohnung 3',    label: 'Whg 3 — Rolf',           xMin: -6, xMax: -1.5, y: 6 },
  { name: 'Wohnung 2',    label: 'Whg 2 — leer',           xMin: -1.5, xMax: 3,  y: 6 },
  { name: 'Wohnung 1',    label: 'Whg 1 — Marta',          xMin: -6, xMax: 3,    y: 3 },
  { name: 'Eingang/Flur', label: 'Eingang',                 xMin: -6, xMax: 0,    y: 0 },
  { name: 'Briefkästen',  label: 'Briefkästen',             xMin: 0,  xMax: 3,    y: 0 },
];

const LOCATION_3D = {
  'Wohnung 6':            { x: -1.5,  y: 12.5, z: -3 },
  'Wohnung 5':            { x: -3.75, y: 9.5,  z: -3 },
  'Wohnung 4':            { x: 0.75,  y: 9.5,  z: -3 },
  'Wohnung 3':            { x: -3.75, y: 6.5,  z: -3 },
  'Wohnung 2':            { x: 0.75,  y: 6.5,  z: -3 },
  'Wohnung 1':            { x: -1.5,  y: 3.5,  z: -3 },
  'Eingang/Flur':         { x: -3,    y: 0.5,  z: -3 },
  'Briefkästen':          { x: 1.5,   y: 0.5,  z: -3 },
  'Treppenhaus':          { x: 4,     y: 7.5,  z: -3 },
  'Hinterhof':            { x: -1.5,  y: 0.2,  z: -10 },
  'Späti':                { x: -10,   y: 0.5,  z: -3 },
  'Eckkneipe Zum Anker':  { x: 9,     y: 0.5,  z: -3 },
  'Arbeitsplatz':         { x: 25,    y: 0.5,  z: -3 },
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════

let currentTick = null;
let availableTicks = [];
let autoRefresh = false;
let autoTimer = null;
let sidebarOpen = true;
let selectedAgent = null;
let currentTickData = null;
let cachedState = null;
let cachedMemories = null;
let currentHour = 12;
let currentWeather = '';

const agentState = {};
const activeBubbles = [];
const bubbleTimeouts = [];
const roomLights = {};

// ═══════════════════════════════════════════════════════════
//  THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f0f);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(12, 12, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
labelRenderer.domElement.style.zIndex = '1';
document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6, -3);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ═══════════════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════════════

const hemiLight = new THREE.HemisphereLight(0xFFFAE0, 0x444444, 0.4);
scene.add(hemiLight);

const sunLight = new THREE.DirectionalLight(0xFFFFFF, 0.8);
sunLight.position.set(10, 20, 15);
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.2);
scene.add(ambientLight);

const lightTarget = {
  skyColor: new THREE.Color(0xFFFAE0),
  sunColor: new THREE.Color(0xFFFFFF),
  sunIntensity: 0.8,
  ambientIntensity: 0.4,
};

function setLightingForHour(hour, weather) {
  let sky, sun, sunI, ambI;
  if (hour >= 7 && hour < 9) {
    sky = new THREE.Color(0xFFD4A0);
    sun = new THREE.Color(0xFFB070);
    sunI = 0.6; ambI = 0.3;
  } else if (hour >= 9 && hour < 17) {
    sky = new THREE.Color(0xFFFAE0);
    sun = new THREE.Color(0xFFFFFF);
    sunI = 0.8; ambI = 0.4;
  } else if (hour >= 17 && hour < 19) {
    sky = new THREE.Color(0xFFB060);
    sun = new THREE.Color(0xFF9040);
    sunI = 0.5; ambI = 0.25;
  } else {
    sky = new THREE.Color(0x3a3050);
    sun = new THREE.Color(0x8080C0);
    sunI = 0.2; ambI = 0.15;
  }
  if (weather) {
    if (weather.includes('Regen')) sunI *= 0.8;
    else if (weather.includes('Sonnig')) sunI *= 1.2;
  }
  lightTarget.skyColor = sky;
  lightTarget.sunColor = sun;
  lightTarget.sunIntensity = sunI;
  lightTarget.ambientIntensity = ambI;
}

function updateLighting(dt) {
  hemiLight.color.lerp(lightTarget.skyColor, dt * 2);
  sunLight.color.lerp(lightTarget.sunColor, dt * 2);
  sunLight.intensity += (lightTarget.sunIntensity - sunLight.intensity) * dt * 2;
  ambientLight.intensity += (lightTarget.ambientIntensity - ambientLight.intensity) * dt * 2;
  for (const rl of Object.values(roomLights)) {
    rl.current += (rl.target - rl.current) * dt * 3;
    rl.light.intensity = rl.current;
  }
}

function setRoomGlow(location, active) {
  if (!roomLights[location]) {
    const pos = LOCATION_3D[location];
    if (!pos) return;
    const light = new THREE.PointLight(0xe8a44a, 0, 6);
    light.position.set(pos.x, pos.y + 1.5, pos.z);
    scene.add(light);
    roomLights[location] = { light, current: 0, target: 0 };
  }
  roomLights[location].target = active ? 0.3 : 0;
}

// ═══════════════════════════════════════════════════════════
//  BUILDING GEOMETRY
// ═══════════════════════════════════════════════════════════

const buildingGroup = new THREE.Group();
scene.add(buildingGroup);

const floorMat   = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 });
const wallMat    = new THREE.MeshStandardMaterial({ color: 0x2d2d2d, roughness: 0.9 });
const ceilMat    = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const stairMat   = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
const extMat     = new THREE.MeshStandardMaterial({ color: 0x282828, roughness: 0.9 });
const groundMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95 });
const furnMat    = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
const edgeMat    = new THREE.LineBasicMaterial({ color: 0x4a4a4a });

function makeBox(w, h, d, mat, x, y, z) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  buildingGroup.add(mesh);
  const edges = new THREE.EdgesGeometry(geo);
  const line = new THREE.LineSegments(edges, edgeMat);
  line.position.set(x, y, z);
  buildingGroup.add(line);
  return mesh;
}

// Build rooms
for (const room of ROOM_DEFS) {
  const w = room.xMax - room.xMin;
  const cx = (room.xMin + room.xMax) / 2;
  const cz = BUILDING_Z_BACK / 2;
  const h = FLOOR_HEIGHT;

  // Floor slab
  makeBox(w, 0.1, BUILDING_DEPTH, floorMat, cx, room.y, cz);
  // Ceiling
  makeBox(w, 0.1, BUILDING_DEPTH, ceilMat, cx, room.y + h, cz);
  // Back wall
  makeBox(w, h, 0.1, wallMat, cx, room.y + h / 2, BUILDING_Z_BACK);
  // Left wall
  makeBox(0.1, h, BUILDING_DEPTH, wallMat, room.xMin, room.y + h / 2, cz);
  // Right wall
  makeBox(0.1, h, BUILDING_DEPTH, wallMat, room.xMax, room.y + h / 2, cz);

  // Furniture silhouettes
  const fx = room.xMin + w * 0.25;
  const fz = BUILDING_Z_BACK + 1.5;
  makeBox(0.8, 0.4, 0.5, furnMat, fx, room.y + 0.2, fz);                    // table
  makeBox(0.4, 0.8, 0.4, furnMat, room.xMax - 0.8, room.y + 0.4, fz);       // fridge

  // Room label (CSS2D)
  const labelDiv = document.createElement('div');
  labelDiv.className = 'room-label';
  labelDiv.textContent = room.label;
  labelDiv.dataset.location = room.name;
  const labelObj = new CSS2DObject(labelDiv);
  labelObj.position.set(cx, room.y + h - 0.2, 0.3);
  buildingGroup.add(labelObj);
}

// Stairwell
{
  const sx = 3, sx2 = 5, scx = 4, sh = 15;
  const cz = BUILDING_Z_BACK / 2;
  makeBox(0.1, sh, BUILDING_DEPTH, wallMat, sx, sh / 2, cz);   // left wall
  makeBox(0.1, sh, BUILDING_DEPTH, wallMat, sx2, sh / 2, cz);  // right wall
  makeBox(2, sh, 0.1, wallMat, scx, sh / 2, BUILDING_Z_BACK);  // back wall

// ═══════════════════════════════════════════════════════════
//  AGENT POSITION CALCULATION
// ═══════════════════════════════════════════════════════════

function isAway(location) {
  return !location || location === 'Arbeitsplatz' || location === 'away';
}

function getLocation3D(locationName) {
  return LOCATION_3D[locationName] || { x: 0, y: 0.2, z: -12 };
}

function updateAgentPositions(locationMap) {
  // Build agent→location map
  const agentLocMap = {};
  for (const [loc, agents] of Object.entries(locationMap)) {
    for (const agent of agents) {
      agentLocMap[agent] = loc;
    }
  }

  // Count agents per location for spreading
  const locAgents = {};
  for (const [agent, loc] of Object.entries(agentLocMap)) {
    if (!locAgents[loc]) locAgents[loc] = [];
    locAgents[loc].push(agent);
  }

  for (const [name, state] of Object.entries(agentState)) {
    const loc = agentLocMap[name];
    state.location = loc || null;

    if (isAway(loc)) {
      state.targetOpacity = 0;
      state.targetPos.set(25, 0.5, -3);
    } else {
      state.targetOpacity = 1;
      const base = getLocation3D(loc);
      const sameLocAgents = locAgents[loc] || [name];
      const idx = sameLocAgents.indexOf(name);
      const count = sameLocAgents.length;
      const spacing = 0.8;
      const offsetX = (idx - (count - 1) / 2) * spacing;
      state.targetPos.set(base.x + offsetX, base.y, base.z);
    }

    // Start lerp
    state.currentPos.copy(state.mesh.position);
    state.lerpT = 0;
    state.mesh.visible = true;
  }
}

// ═══════════════════════════════════════════════════════════
//  SPEECH BUBBLES
// ═══════════════════════════════════════════════════════════

function clearBubbles() {
  for (const b of activeBubbles) {
    if (agentState[b.agentName]) {
      agentState[b.agentName].mesh.remove(b.label);
    }
  }
  activeBubbles.length = 0;
  bubbleTimeouts.forEach(t => clearTimeout(t));
  bubbleTimeouts.length = 0;
  for (const loc of Object.keys(roomLights)) {
    setRoomGlow(loc, false);
  }
}

function showBubble(agentName, text, type) {
  const state = agentState[agentName];
  if (!state || state.targetOpacity < 0.5) return;

  // Remove existing bubble for this agent
  const existing = activeBubbles.findIndex(b => b.agentName === agentName);
  if (existing >= 0) {
    const old = activeBubbles[existing];
    state.mesh.remove(old.label);
    activeBubbles.splice(existing, 1);
  }

  const div = document.createElement('div');
  div.className = `bubble bubble-${type}`;
  const maxLen = 120;
  const displayText = text.length > maxLen ? text.substring(0, maxLen) + '…' : text;
  div.textContent = type === 'speak' ? `„${displayText}"` : displayText;

  const label = new CSS2DObject(div);
  label.position.set(0, 1.8, 0);
  state.mesh.add(label);

  const bubble = { label, div, agentName };
  activeBubbles.push(bubble);

  const fadeTimer = setTimeout(() => {
    div.classList.add('fading');
    const removeTimer = setTimeout(() => {
      state.mesh.remove(label);
      const idx = activeBubbles.indexOf(bubble);
      if (idx >= 0) activeBubbles.splice(idx, 1);
    }, 500);
    bubbleTimeouts.push(removeTimer);
  }, 3000);
  bubbleTimeouts.push(fadeTimer);
}

function scheduleBubbles(tickData) {
  clearBubbles();
  if (!tickData.locations) return;

  let delay = 0;
  for (const [location, locData] of Object.entries(tickData.locations)) {
    if (!locData.rounds) continue;
    let hasSpeak = false;
    for (const round of locData.rounds) {
      if (!round.actions) continue;
      for (const agentAction of round.actions) {
        for (const tc of (agentAction.tool_calls || [])) {
          if (tc.tool === 'speak') {
            const d = delay;
            const t = setTimeout(() => showBubble(agentAction.agent, tc.args.text || '', 'speak'), d);
            bubbleTimeouts.push(t);
            delay += 400;
            hasSpeak = true;
          } else if (tc.tool === 'do') {
            const d = delay;
            const t = setTimeout(() => showBubble(agentAction.agent, tc.args.text || '', 'do'), d);
            bubbleTimeouts.push(t);
            delay += 400;
          }
        }
      }
    }
    if (hasSpeak) setRoomGlow(location, true);
  }

  if (delay > 0) {
    const t = setTimeout(() => {
      for (const loc of Object.keys(roomLights)) setRoomGlow(loc, false);
    }, delay + 3500);
    bubbleTimeouts.push(t);
  }
}

// ═══════════════════════════════════════════════════════════
//  RAYCASTING
// ═══════════════════════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  // Ignore clicks on overlays
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = [];
  for (const state of Object.values(agentState)) {
    if (state.mesh.visible && state.currentOpacity > 0.3) {
      state.mesh.traverse(child => {
        if (child.isMesh) meshes.push(child);
      });
    }
  }

  const intersects = raycaster.intersectObjects(meshes, false);
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj && !obj.userData.agentName) obj = obj.parent;
    if (obj && obj.userData.agentName) {
      selectAgent(obj.userData.agentName);
    }
  }
});

//  API LAYER
// ═══════════════════════════════════════════════════════════

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function parseHour(timeStr) {
  if (!timeStr) return 12;
  const m = timeStr.match(/(\d{1,2}):\d{2}/);
  return m ? parseInt(m[1]) : 12;
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR: SCENE LOG
// ═══════════════════════════════════════════════════════════

function renderScenes(tickData) {
  const panel = document.getElementById('scene-content');
  const DISPLAY = {};
  for (const [k, v] of Object.entries(AGENTS)) DISPLAY[k] = v.display;

  // Night tick
  if (tickData.is_night) {
    let html = '';
    if (tickData.night_reflections) {
      for (const [agent, refl] of Object.entries(tickData.night_reflections)) {
        if (refl.type === 'nothing' || !refl.content) continue;
        html += `<div class="night-card">
          <div class="night-label">${DISPLAY[agent] || agent} — ${refl.type}</div>
          <div style="font-size: 13px; line-height: 1.5;">${escapeHtml(refl.content)}</div>
        </div>`;
      }
      if (!html) html = '<div class="no-data">Alle schlafen ruhig.</div>';
    }
    panel.innerHTML = html;
    return;
  }

  // New format: locations with rounds
  if (tickData.locations) {
    let html = '';

    if (tickData.environment) {
      html += `<div class="env-info">${escapeHtml(tickData.environment.weather)}`;
      if (tickData.environment.ambient) html += ` — ${escapeHtml(tickData.environment.ambient)}`;
      html += '</div>';
    }

    const entries = Object.entries(tickData.locations);
    if (entries.length === 0) {
      panel.innerHTML = '<div class="no-data">Keine aktiven Szenen.</div>';
      return;
    }

    for (const [location, locData] of entries) {
      const hasInteraction = locData.agents && locData.agents.length > 1;
      html += `<div class="location-card ${hasInteraction ? 'has-interaction' : 'solo'}">`;
      html += `<div class="location-header">${escapeHtml(location)}</div>`;
      html += `<div class="location-agents-label">${(locData.agents || []).map(a => DISPLAY[a] || a).join(', ')}</div>`;

      if (locData.rounds) {
        for (const round of locData.rounds) {
          if (locData.rounds.length > 1) {
            html += `<div class="round-label">Runde ${round.round}</div>`;
          }
          for (const agentActions of (round.actions || [])) {
            html += `<div class="action-entry">`;
            html += `<div class="action-agent" data-agent="${agentActions.agent}">${DISPLAY[agentActions.agent] || agentActions.agent}</div>`;
            for (const tc of (agentActions.tool_calls || [])) {
              if (tc.tool === 'speak') {
                html += `<div class="tool-speak">${escapeHtml(String(tc.args.text || ''))}</div>`;
              } else if (tc.tool === 'think') {
                html += `<div class="tool-think">${escapeHtml(String(tc.args.text || ''))}</div>`;
              } else if (tc.tool === 'do') {
                html += `<div class="tool-action">${escapeHtml(String(tc.args.text || ''))}</div>`;
              } else if (tc.tool === 'move_to') {
                html += `<div class="tool-move">→ ${escapeHtml(String(tc.args.location || ''))}</div>`;
              } else if (tc.tool !== 'wait') {
                html += `<div class="tool-other">[${tc.tool}] ${escapeHtml(tc.result || '')}</div>`;
              }
            }
            html += `</div>`;
          }
        }
      }
      html += `</div>`;
    }

    if (tickData.movements && tickData.movements.length > 0) {
      html += '<div style="margin-top: 12px; font-size: 11px; color: var(--text-dim);">';
      html += '<strong>Bewegungen:</strong><br>';
      for (const m of tickData.movements) {
        html += `${DISPLAY[m.agent] || m.agent}: ${m.from} → ${m.to}<br>`;
      }
      html += '</div>';
    }

    panel.innerHTML = html;
    return;
  }

  // Old format: scenes with reactions
  if (tickData.scenes) {
    if (tickData.scenes.length === 0) {
      panel.innerHTML = '<div class="no-data">Keine aktiven Szenen.</div>';
      return;
    }
    let html = '';
    for (const scene of tickData.scenes) {
      html += `<div class="location-card">`;
      html += `<div class="location-header">${escapeHtml(scene.location)}</div>`;
      html += `<div class="location-agents-label">${(scene.agents || []).map(a => DISPLAY[a] || a).join(', ')}</div>`;
      if (scene.world_state_narration) {
        html += `<div class="env-info">${escapeHtml(scene.world_state_narration)}</div>`;
      }
      if (scene.reactions) {
        for (const [agent, reaction] of Object.entries(scene.reactions)) {
          html += `<div class="action-entry">`;
          html += `<div class="action-agent" data-agent="${agent}">${DISPLAY[agent] || agent}</div>`;
          html += `<div class="tool-action">${escapeHtml(reaction.action)}</div>`;
          if (reaction.dialogue) html += `<div class="tool-speak">${escapeHtml(reaction.dialogue)}</div>`;
          if (reaction.inner_thought) html += `<div class="tool-think">${escapeHtml(reaction.inner_thought)}</div>`;
          html += `</div>`;
        }
      }
      html += `</div>`;
    }
    panel.innerHTML = html;
    return;
  }

  panel.innerHTML = '<div class="no-data">Keine Daten.</div>';
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR: AGENT DETAIL
// ═══════════════════════════════════════════════════════════

async function selectAgent(name) {
  selectedAgent = name;
  const agent = AGENTS[name];
  if (!agent) return;

  // Focus camera on agent
  const state = agentState[name];
  if (state && state.location && !isAway(state.location)) {
    focusCameraOn(getLocation3D(state.location));
  }

  // Show detail in sidebar
  let html = `<div class="agent-detail">`;
  html += `<div class="agent-detail-header">`;
  html += `<div><span class="agent-detail-name" style="color:${agent.color}">${agent.display}</span>`;
  html += `<span class="agent-detail-loc">${state?.location || '—'}</span></div>`;
  html += `<button class="agent-detail-close" onclick="document.getElementById('agent-detail').style.display='none'">×</button>`;
  html += `</div>`;

  // Body stats
  if (cachedState && cachedState.body && cachedState.body[name]) {
    html += `<div class="detail-stats">`;
    for (const [key, val] of Object.entries(cachedState.body[name])) {
      html += `<div class="stat-row"><span class="stat-label">${key}</span><span class="stat-value">${val}</span></div>`;
    }
    html += `</div>`;
  }

  // Memory excerpt
  if (!cachedMemories) cachedMemories = await fetchJSON('/api/memories');
  if (cachedMemories && cachedMemories[name]) {
    const excerpt = cachedMemories[name].substring(0, 600);
    html += `<div class="detail-memory"><h3>Memory</h3><pre>${escapeHtml(excerpt)}${cachedMemories[name].length > 600 ? '…' : ''}</pre></div>`;
  }

  html += `</div>`;
  document.getElementById('agent-detail').innerHTML = html;
  document.getElementById('agent-detail').style.display = 'block';

  if (!sidebarOpen) toggleSidebar();
}

function buildTimeline() {
  const track = document.getElementById('timeline-track');
  track.innerHTML = '';
  for (const t of availableTicks) {
    const el = document.createElement('div');
    el.className = 'tick-marker';
    el.dataset.tick = t;
    el.title = `Tick ${t}`;
    el.classList.toggle('active', t === currentTick);
    el.addEventListener('click', () => loadTick(t));
    track.appendChild(el);
  }
}

function updateButtons() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  if (currentTick === null) {
    prev.disabled = true;
    next.disabled = true;
    return;
  }
  const idx = availableTicks.indexOf(currentTick);
  prev.disabled = idx <= 0;
  next.disabled = idx >= availableTicks.length - 1;
  const tickIdx = availableTicks.indexOf(currentTick);
  document.getElementById('timeline-info').textContent = `Tick ${currentTick} (${tickIdx + 1}/${availableTicks.length})`;
}

document.getElementById('btn-prev').addEventListener('click', () => {
  const idx = availableTicks.indexOf(currentTick);
  if (idx > 0) loadTick(availableTicks[idx - 1]);
});

document.getElementById('btn-next').addEventListener('click', () => {
  const idx = availableTicks.indexOf(currentTick);
  if (idx < availableTicks.length - 1) loadTick(availableTicks[idx + 1]);
});

document.getElementById('btn-auto').addEventListener('click', () => {
  autoRefresh = !autoRefresh;
  document.getElementById('btn-auto').classList.toggle('active', autoRefresh);
  if (autoRefresh) pollForUpdates();
  else if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
});

// ═══════════════════════════════════════════════════════════
//  LOAD TICK
// ═══════════════════════════════════════════════════════════

async function loadTick(tick) {
  const padded = 'tick_' + tick.toString().padStart(5, '0');
  const data = await fetchJSON(`/api/tick/${padded}`);
  if (!data) return;

  currentTick = tick;
  currentTickData = data;

  // Top bar
  document.getElementById('sim-time').textContent = data.simulated_time || '';
  const weatherText = data.environment?.weather || '';
  document.getElementById('sim-weather').textContent = weatherText;
  const tickIdx = availableTicks.indexOf(tick);
  document.getElementById('sim-counter').textContent = `Tick ${tick}`;

  // Parse hour for lighting
  currentHour = parseHour(data.simulated_time);
  currentWeather = weatherText;
  setLightingForHour(currentHour, currentWeather);

  // Agent positions
  const locationMap = {};
  if (data.locations) {
    for (const [loc, locData] of Object.entries(data.locations)) {
      locationMap[loc] = locData.agents || [];
    }
  } else {
    // Fallback to state
    if (!cachedState) cachedState = await fetchJSON('/api/state');
    if (cachedState && cachedState.agent_locations) {
      for (const [agent, loc] of Object.entries(cachedState.agent_locations)) {
        if (!locationMap[loc]) locationMap[loc] = [];
        locationMap[loc].push(agent);
      }
    }
  }
  updateAgentPositions(locationMap);

  // Schedule speech bubbles
  scheduleBubbles(data);

  // Sidebar scene log
  renderScenes(data);

  // Timeline
  buildTimeline();
  updateButtons();

  // Update cached state
  cachedState = await fetchJSON('/api/state');
}

// ═══════════════════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════════════════

async function pollForUpdates() {
  if (!autoRefresh) return;
  const ticks = await fetchJSON('/api/ticks');
  if (ticks) {
    availableTicks = ticks.map(t => parseInt(t.replace('tick_', '')));
    if (availableTicks.length > 0) {
      const latest = availableTicks[availableTicks.length - 1];
      if (latest !== currentTick) await loadTick(latest);
    }
  }
  autoTimer = setTimeout(pollForUpdates, 3000);
}

document.addEventListener('keydown', (e) => {
  // Don't handle if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch (e.key) {
    case 'ArrowLeft':
      document.getElementById('btn-prev').click();
      break;
    case 'ArrowRight':
      document.getElementById('btn-next').click();
      break;
    case 's': case 'S':
      toggleSidebar();
      break;
    case 'f': case 'F':
      fitAll();
      break;
    case '1': case '2': case '3': case '4': case '5': case '6': {
      const loc = `Wohnung ${e.key}`;
      const pos = LOCATION_3D[loc];
      if (pos) focusCameraOn(pos);
      break;
    }
  }
});

// ═══════════════════════════════════════════════════════════
//  SMOOTHSTEP
// ═══════════════════════════════════════════════════════════

function smoothstep(t) {
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

// ═══════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════

let prevTime = performance.now();

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - prevTime) / 1000, 0.1);
  prevTime = time;

  // Agent lerp + opacity
  for (const [name, state] of Object.entries(agentState)) {
    // Position lerp
    if (state.lerpT < 1) {
      state.lerpT = Math.min(1, state.lerpT + dt * 1.5);
      const t = smoothstep(state.lerpT);
      state.mesh.position.lerpVectors(state.currentPos, state.targetPos, t);
    }

    // Opacity
    state.currentOpacity += (state.targetOpacity - state.currentOpacity) * dt * 3;
    state.bodyMat.opacity = state.currentOpacity;
    state.headMat.opacity = state.currentOpacity;
    state.mesh.visible = state.currentOpacity > 0.01;
    state.label.visible = state.currentOpacity > 0.3;
  }

  // Camera focus animation
  if (cameraFocus && cameraFocus.t < 1) {
    cameraFocus.t = Math.min(1, cameraFocus.t + dt * 1.5);
    const t = smoothstep(cameraFocus.t);
    camera.position.lerpVectors(cameraFocus.from, cameraFocus.to, t);
    controls.target.lerpVectors(cameraFocus.controlsFrom, cameraFocus.controlsTo, t);
  }

  // Lighting
  updateLighting(dt);

  // Controls
  controls.update();

  // Render
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

requestAnimationFrame(animate);

// ═══════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

async function init() {
  // Load state for initial agent placement
  cachedState = await fetchJSON('/api/state');
  if (cachedState) {
    if (cachedState.agent_locations) {
      const locMap = {};
      for (const [agent, loc] of Object.entries(cachedState.agent_locations)) {
        if (!locMap[loc]) locMap[loc] = [];
        locMap[loc].push(agent);
      }
      updateAgentPositions(locMap);
      // Snap to position immediately (no lerp on first load)
      for (const state of Object.values(agentState)) {
        state.mesh.position.copy(state.targetPos);
        state.currentPos.copy(state.targetPos);
        state.lerpT = 1;
        state.currentOpacity = state.targetOpacity;
        state.bodyMat.opacity = state.currentOpacity;
        state.headMat.opacity = state.currentOpacity;
        state.mesh.visible = state.currentOpacity > 0.01;
      }
    }
    document.getElementById('sim-time').textContent = cachedState.current_time || '';
    if (cachedState.weather) {
      document.getElementById('sim-weather').textContent = cachedState.weather;
      setLightingForHour(parseHour(cachedState.current_time), cachedState.weather);
    }
  }

  // Load ticks
  const ticks = await fetchJSON('/api/ticks');
  if (ticks && ticks.length > 0) {
    availableTicks = ticks.map(t => parseInt(t.replace('tick_', '')));
    buildTimeline();
    const latest = availableTicks[availableTicks.length - 1];
    await loadTick(latest);
  } else {
    buildTimeline();
  }
}

init();
</script>
